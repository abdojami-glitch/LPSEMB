<script>
        document.addEventListener("DOMContentLoaded", function() {
            const stickyCta = document.getElementById('sticky-cta');
            const mainCta = document.getElementById('main-cta');
            const registrationForm = document.getElementById('registration-form');

            // 1. Observer l'Bouton CTA L'asli
            const mainCtaObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    // Ila kan l'bouton l'asli kayban f chacha, wla ba9i lfo9 -> Khbe3 sticky
                    if (entry.isIntersecting || entry.boundingClientRect.top > 0) {
                        stickyCta.classList.remove('visible');
                    } else {
                        // Ila tjaweznah b scrolling lta7t -> Biyen sticky
                        stickyCta.classList.add('visible');
                    }
                });
            }, { threshold: 0 }); // Kikhdem mnin l'bouton kikhrej kamel mn chacha

            mainCtaObserver.observe(mainCta);

            // 2. Observer l'Formulaire (Bach nkhb3ou sticky mnin nwslou n3mrou l'ma3loumat)
            const formObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Mnin twsel l form, sticky kayghber
                        stickyCta.classList.remove('visible');
                    } else if (mainCta.getBoundingClientRect().top < 0) {
                        // Mnin trje3 tl3 lfo9 chwiya (w ba9i ta7t CTA l'asli), yrje3 iban
                        stickyCta.classList.add('visible');
                    }
                });
            }, { threshold: 0.2 }); // Kikhdem mnin kiban 20% mn l'formulaire

            formObserver.observe(registrationForm);
        });
    </script>
